<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frightening TV</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --mint: #e2f3f5; --lavender: #f3e8ff; --peach: #fff1e6; }
        body { background: linear-gradient(135deg, var(--mint), var(--lavender)); min-height: 100vh; color: #2d3748; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px; }
        .genre-bubble { cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .genre-bubble.selected { transform: scale(1.1); border-color: #8b5cf6; background-color: #8b5cf6 !important; color: white !important;}
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { color: #8b5cf6; border-bottom: 3px solid #8b5cf6; font-weight: 900; }
        .animate-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar-fill { transition: width 0.8s ease-out; }
    </style>
</head>
<body class="p-3 pb-20">

    <div id="loading-screen" class="fixed inset-0 bg-white/95 flex flex-col items-center justify-center z-[100] backdrop-blur-md">
        <div class="animate-bounce text-6xl mb-4 shadow-xl rounded-full bg-white p-4">🎦</div>
        <p class="font-black text-purple-900 animate-pulse tracking-widest text-sm uppercase">Preparando la sala...</p>
    </div>

    <div id="user-selection" class="hidden flex flex-col items-center justify-center h-screen space-y-8">
        <h1 class="text-5xl font-black text-purple-900 tracking-tighter drop-shadow-sm flex items-center gap-2">Frightening TV</h1>
        <div id="profile-container" class="flex flex-wrap justify-center gap-6 w-full px-4"></div>
    </div>

    <div id="app-main" class="hidden max-w-md mx-auto space-y-4">
        <header class="bg-white/60 p-4 rounded-[30px] shadow-sm backdrop-blur-md border border-white">
            <div class="flex justify-between items-start mb-2">
                <div class="flex items-center gap-3">
                    <button onclick="openAvatarSelector()" id="main-avatar" class="text-3xl bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg active:scale-90 border-2 border-purple-100"></button>
                    <div>
                        <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Es tu turno,</p>
                        <div class="flex items-center gap-2 mt-0.5">
                            <h2 id="welcome" class="text-xl font-black text-purple-900 leading-none"></h2>
                            <button onclick="openMatchModal()" class="bg-pink-100 text-pink-600 px-2 py-0.5 rounded text-[9px] font-black shadow-sm active:scale-95 transition border border-pink-200 flex items-center gap-1">💞 MATCH</button>
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <span class="text-[10px] font-black text-purple-300 uppercase tracking-widest bg-white px-2 py-0.5 rounded-full shadow-sm">Frightening TV</span>
                    <button onclick="location.reload()" class="bg-white p-2 rounded-full text-xs shadow-sm active:scale-90 font-bold">🔄</button>
                </div>
            </div>
            <div id="missions-widget" class="mt-3 space-y-1.5 hidden"></div>
        </header>

        <div class="flex gap-2 px-1">
            <button id="type-movie-btn" onclick="setMediaType('movie')" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-purple-600 text-white shadow-lg shadow-purple-200">🎬 Películas</button>
            <button id="type-tv-btn" onclick="setMediaType('tv')" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-white text-gray-400 border border-gray-100">📺 Series</button>
        </div>

        <nav class="flex justify-between bg-white/70 rounded-2xl overflow-hidden shadow-sm backdrop-blur-sm border border-white px-1 mt-2">
            <button onclick="showTab('explorar')" id="btn-explorar" class="tab-btn active p-3 font-bold text-[9px] uppercase">🔍 Buscar</button>
            <button onclick="showTab('prioridades')" id="btn-prioridades" class="tab-btn p-3 font-bold text-[9px] uppercase">🔥 Pends</button>
            <button onclick="showTab('historial')" id="btn-historial" class="tab-btn p-3 font-bold text-[9px] uppercase">✅ Vistas</button>
            <button onclick="showTab('favoritos')" id="btn-favoritos" class="tab-btn p-3 font-bold text-[9px] uppercase">⭐ Favs</button>
            <button onclick="showTab('misiones')" id="btn-misiones" class="tab-btn p-3 font-bold text-[9px] uppercase text-orange-600">🏆 Misión</button>
        </nav>

        <section id="tab-explorar" class="tab-content space-y-4 animate-up">
            <div class="glass p-5 space-y-4">
                <div class="flex justify-center mb-2">
                    <div class="bg-purple-100 p-1 rounded-full flex gap-1 shadow-inner w-full max-w-[250px]">
                        <button id="mode-text-btn" onclick="setSearchMode('text')" class="switch-btn flex-1 px-4 py-1.5 rounded-full text-xs font-black text-gray-400">Texto</button>
                        <button id="mode-filter-btn" onclick="setSearchMode('filters')" class="switch-btn active flex-1 px-4 py-1.5 rounded-full text-xs font-black text-gray-400 bg-white text-purple-800 shadow-sm">Filtros</button>
                    </div>
                </div>

                <div id="search-text-container" class="hidden space-y-3">
                    <input type="text" id="search-input" placeholder="Ej: Inception..." class="w-full p-4 rounded-xl bg-white/80 border-none font-bold outline-none text-sm">
                    <button onclick="fetchMovies(false)" class="w-full py-3 bg-purple-600 text-white rounded-xl font-black shadow-lg shadow-purple-300">BUSCAR 🔍</button>
                </div>

                <div id="search-filter-container" class="space-y-4">
                    <div id="genre-container" class="flex flex-wrap gap-2 mt-1"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="region" class="w-full p-2 bg-white/70 rounded-xl text-[10px] font-bold shadow-sm outline-none">
                            <option value="">🌎 País (Todos)</option><option value="CL">🇨🇱 Chile</option><option value="US">🇺🇸 USA</option>
                            <option value="ES">🇪🇸 España</option><option value="KR">🇰🇷 Corea</option><option value="JP">🇯🇵 Japón</option><option value="IN">🇮🇳 India</option>
                        </select>
                        <select id="duration" class="w-full p-2 bg-white/70 rounded-xl text-[10px] font-bold shadow-sm outline-none">
                            <option value="400">⏱️ Duración (Todas)</option><option value="90">⏳ Corta (-1h30m)</option>
                            <option value="120">🎬 Normal (-2h)</option><option value="180">🍿 Épica (-3h)</option>
                        </select>
                        <select id="decade" class="col-span-2 w-full p-2 bg-white/70 rounded-xl text-[11px] font-bold shadow-sm outline-none">
                            <option value="">📅 Época (Cualquiera)</option>
                            <option value="2020">✨ 2020s</option><option value="2010">📱 2010s</option><option value="2000">💿 2000s</option>
                            <option value="1990">📼 90s</option><option value="1980">📻 80s</option><option value="classic">🎩 Clásicos (-1980)</option>
                        </select>
                    </div>
                    <button onclick="fetchMovies(false)" class="w-full py-3 bg-purple-600 text-white rounded-xl font-black shadow-lg shadow-purple-300">DESCUBRIR ✨</button>
                </div>
            </div>
            
            <div id="search-title" class="font-black text-purple-900 pl-2 hidden">Resultados:</div>
            <div id="movie-results" class="space-y-3"></div>
            <button id="btn-load-more" onclick="fetchMovies(true)" class="hidden w-full py-3 bg-white text-purple-600 rounded-xl font-black shadow-sm mt-4 text-xs">Cargar más resultados ⬇️</button>
        </section>

        <section id="tab-prioridades" class="tab-content hidden space-y-3 animate-up pb-10"></section>
        
        <section id="tab-historial" class="tab-content hidden space-y-3 animate-up pb-10"></section>

        <section id="tab-favoritos" class="tab-content hidden space-y-3 animate-up pb-10">
            <h3 class="font-black text-sm text-purple-900 pl-2">Mis Favoritos ⭐</h3>
            <div id="fav-list" class="grid grid-cols-3 gap-2 mt-3"></div>
            <div id="fav-movies-container" class="hidden mt-6 pt-4 border-t-2 border-purple-100">
                <div class="flex justify-between items-center mb-4 pl-2">
                    <h4 id="fav-movies-title" class="font-black text-xs text-purple-900"></h4>
                    <button onclick="closeFavMovies()" class="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-lg font-black shadow-sm">CERRAR ✕</button>
                </div>
                <div id="fav-movies-results" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-misiones" class="tab-content hidden space-y-4 animate-up pb-10">
            <h3 class="font-black text-sm text-orange-600 pl-2">Centro de Misiones 🏆</h3>
            <p class="text-[10px] text-gray-500 pl-2 leading-tight">Activa hasta 3 misiones para ganar medallas. Tu progreso se calculará automáticamente con las películas que marques como Vistas.</p>
            <div id="missions-catalog" class="space-y-3 mt-4"></div>
        </section>
    </div>

    <div id="avatar-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[300] backdrop-blur-sm">
        <div class="bg-white p-6 w-full max-w-xs space-y-4 rounded-[30px] shadow-2xl animate-up">
            <h3 class="font-black text-purple-900 text-center text-lg">Elige tu Avatar</h3>
            <div class="grid grid-cols-4 gap-4 text-3xl text-center">
                <span onclick="setEmoji('🌸')" class="cursor-pointer active:scale-90">🌸</span><span onclick="setEmoji('😎')" class="cursor-pointer active:scale-90">😎</span>
                <span onclick="setEmoji('🎮')" class="cursor-pointer active:scale-90">🎮</span><span onclick="setEmoji('🥑')" class="cursor-pointer active:scale-90">🥑</span>
                <span onclick="setEmoji('🐼')" class="cursor-pointer active:scale-90">🐼</span><span onclick="setEmoji('🦊')" class="cursor-pointer active:scale-90">🦊</span>
                <span onclick="setEmoji('🦄')" class="cursor-pointer active:scale-90">🦄</span><span onclick="setEmoji('🍄')" class="cursor-pointer active:scale-90">🍄</span>
                <span onclick="setEmoji('✨')" class="cursor-pointer active:scale-90">✨</span><span onclick="setEmoji('👻')" class="cursor-pointer active:scale-90">👻</span>
                <span onclick="setEmoji('🦖')" class="cursor-pointer active:scale-90">🦖</span><span onclick="setEmoji('🍩')" class="cursor-pointer active:scale-90">🍩</span>
            </div>
            <button onclick="closeAvatarSelector()" class="w-full py-3 bg-gray-100 text-gray-500 rounded-xl font-bold text-xs mt-2">CANCELAR</button>
        </div>
    </div>

    <div id="movie-detail-modal" class="fixed inset-0 bg-black/80 hidden flex flex-col justify-end z-[200] backdrop-blur-sm transition-all">
        <div class="bg-white rounded-t-[30px] w-full max-h-[95vh] overflow-y-auto animate-up flex flex-col relative pb-8 shadow-2xl">
            <button type="button" onclick="closeDetailModal(); event.stopPropagation();" class="absolute top-4 right-4 bg-black/50 backdrop-blur-lg text-white w-8 h-8 rounded-full font-black text-sm z-[300] shadow border border-white/30 cursor-pointer active:scale-90">✕</button>
            
            <div id="detail-header-bg" class="w-full h-48 bg-cover bg-center relative rounded-t-[30px]">
                <div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-10"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent z-20"></div>
            </div>
            <div class="px-5 -mt-20 relative z-30">
                <div class="flex gap-4 items-end mb-4">
                    <img id="detail-poster-img" src="" class="w-24 rounded-xl shadow-xl border-2 border-white object-cover bg-gray-200">
                    <div class="pb-1">
                        <h2 id="detail-title" class="text-xl font-black text-gray-900 leading-tight"></h2>
                        <div class="flex flex-wrap gap-1 mt-1.5">
                            <span id="detail-year" class="text-[9px] font-black text-white bg-purple-600 px-2 py-0.5 rounded uppercase shadow-sm"></span>
                            <span id="detail-rating" class="text-[9px
