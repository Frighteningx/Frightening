<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frightening TV & Series</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎦</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --mint: #e2f3f5; --lavender: #f3e8ff; --peach: #fff1e6; }
        body { background: linear-gradient(135deg, var(--mint), var(--lavender)); min-height: 100vh; color: #2d3748; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 24px; }
        .genre-bubble { cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .genre-bubble.selected { transform: scale(1.1); border-color: #8b5cf6; background-color: #8b5cf6 !important; color: white !important;}
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active { color: #8b5cf6; border-bottom: 3px solid #8b5cf6; font-weight: 900; }
        .animate-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar-fill { transition: width 0.8s ease-out; }
    </style>
</head>
<body class="p-3 pb-20">

    <div id="loading-screen" class="fixed inset-0 bg-white/95 flex flex-col items-center justify-center z-[100] backdrop-blur-md">
        <div class="animate-bounce text-6xl mb-4 shadow-xl rounded-full bg-white p-4">🎦</div>
        <p class="font-black text-purple-900 animate-pulse tracking-widest text-sm uppercase">Preparando la sala...</p>
    </div>

    <div id="user-selection" class="hidden flex flex-col items-center justify-center h-screen space-y-8">
        <h1 class="text-5xl font-black text-purple-900 tracking-tighter drop-shadow-sm flex items-center gap-2">Frightening TV</h1>
        <div id="profile-container" class="flex flex-wrap justify-center gap-6 w-full px-4"></div>
    </div>

    <div id="app-main" class="hidden max-w-md mx-auto space-y-4">
        <header class="bg-white/60 p-4 rounded-[30px] shadow-sm backdrop-blur-md border border-white">
            <div class="flex justify-between items-start mb-2">
                <div class="flex items-center gap-3">
                    <button onclick="openAvatarSelector()" id="main-avatar" class="text-3xl bg-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg active:scale-90 border-2 border-purple-100"></button>
                    <div>
                        <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest">Es tu turno,</p>
                        <h2 id="welcome" class="text-xl font-black text-purple-900 leading-none"></h2>
                    </div>
                </div>
                <div class="flex flex-col items-end gap-1">
                    <span class="text-[10px] font-black text-purple-300 uppercase tracking-widest bg-white px-2 py-0.5 rounded-full shadow-sm">Frightening TV</span>
                    <button onclick="location.reload()" class="bg-white p-2 rounded-full text-xs shadow-sm active:scale-90 font-bold">🔄</button>
                </div>
            </div>
            <div id="missions-widget" class="mt-3 space-y-1.5 hidden"></div>
        </header>

        <div class="flex gap-2 px-1">
            <button id="type-movie-btn" onclick="setMediaType('movie')" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-purple-600 text-white shadow-lg shadow-purple-200">🎬 Películas</button>
            <button id="type-tv-btn" onclick="setMediaType('tv')" class="flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-white text-gray-400 border border-gray-100">📺 Series</button>
        </div>

        <nav class="flex justify-between bg-white/70 rounded-2xl overflow-hidden shadow-sm backdrop-blur-sm border border-white px-1">
            <button onclick="showTab('explorar')" id="btn-explorar" class="tab-btn active p-3 font-bold text-[9px] uppercase">🔍 Buscar</button>
            <button onclick="showTab('prioridades')" id="btn-prioridades" class="tab-btn p-3 font-bold text-[9px] uppercase">🔥 Pends</button>
            <button onclick="showTab('historial')" id="btn-historial" class="tab-btn p-3 font-bold text-[9px] uppercase">✅ Vistas</button>
            <button onclick="showTab('favoritos')" id="btn-favoritos" class="tab-btn p-3 font-bold text-[9px] uppercase">⭐ Favs</button>
            <button onclick="showTab('misiones')" id="btn-misiones" class="tab-btn p-3 font-bold text-[9px] uppercase text-orange-600">🏆 Misión</button>
        </nav>

        <section id="tab-explorar" class="tab-content space-y-4 animate-up">
            <div class="glass p-5 space-y-4">
                <div class="flex justify-center mb-2">
                    <div class="bg-purple-100 p-1 rounded-full flex gap-1 shadow-inner w-full max-w-[250px]">
                        <button id="mode-text-btn" onclick="setSearchMode('text')" class="switch-btn flex-1 px-4 py-1.5 rounded-full text-xs font-black text-gray-400">Texto</button>
                        <button id="mode-filter-btn" onclick="setSearchMode('filters')" class="switch-btn active flex-1 px-4 py-1.5 rounded-full text-xs font-black bg-white text-purple-800 shadow-sm">Filtros</button>
                    </div>
                </div>

                <div id="search-text-container" class="hidden space-y-3">
                    <input type="text" id="search-input" placeholder="Buscar título..." class="w-full p-4 rounded-xl bg-white/80 border-none font-bold outline-none text-sm">
                    <button onclick="fetchData(false)" class="w-full py-3 bg-purple-600 text-white rounded-xl font-black shadow-lg">BUSCAR AHORA 🔍</button>
                </div>

                <div id="search-filter-container" class="space-y-4">
                    <div id="genre-container" class="flex flex-wrap gap-2 mt-1"></div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="region" class="w-full p-2 bg-white/70 rounded-xl text-[10px] font-bold shadow-sm outline-none">
                            <option value="">🌎 País (Todos)</option><option value="CL">🇨🇱 Chile</option><option value="US">🇺🇸 USA</option>
                            <option value="ES">🇪🇸 España</option><option value="KR">🇰🇷 Corea</option><option value="JP">🇯🇵 Japón</option>
                        </select>
                        <select id="decade" class="w-full p-2 bg-white/70 rounded-xl text-[10px] font-bold shadow-sm outline-none">
                            <option value="">📅 Época (Todas)</option>
                            <option value="2020">✨ 2020s</option><option value="2010">📱 2010s</option><option value="2000">💿 2000s</option>
                            <option value="1990">📼 90s</option><option value="classic">🎩 Clásicos</option>
                        </select>
                    </div>
                    <button onclick="fetchData(false)" class="w-full py-3 bg-purple-600 text-white rounded-xl font-black shadow-lg">DESCUBRIR ✨</button>
                </div>
            </div>
            
            <div id="search-title" class="font-black text-purple-900 pl-2 hidden">Resultados:</div>
            <div id="movie-results" class="space-y-3"></div>
            <button id="btn-load-more" onclick="fetchData(true)" class="hidden w-full py-3 bg-white text-purple-600 rounded-xl font-black shadow-sm mt-4 text-xs">Cargar más ⬇️</button>
        </section>

        <section id="tab-prioridades" class="tab-content hidden space-y-3 animate-up pb-10"></section>
        <section id="tab-historial" class="tab-content hidden space-y-3 animate-up pb-10"></section>
        <section id="tab-favoritos" class="tab-content hidden space-y-3 animate-up pb-10">
            <h3 class="font-black text-sm text-purple-900 pl-2">Mis Favoritos ⭐</h3>
            <div id="fav-list" class="grid grid-cols-3 gap-2 mt-3"></div>
        </section>
        <section id="tab-misiones" class="tab-content hidden space-y-4 animate-up pb-10"></section>
    </div>

    <div id="movie-detail-modal" class="fixed inset-0 bg-black/80 hidden flex flex-col justify-end z-[200] backdrop-blur-sm transition-all">
        <div class="bg-white rounded-t-[30px] w-full max-h-[95vh] overflow-y-auto animate-up flex flex-col relative pb-8 shadow-2xl">
            <button onclick="closeDetailModal()" class="absolute top-4 right-4 bg-black/50 backdrop-blur-lg text-white w-8 h-8 rounded-full font-black text-sm z-30 shadow border border-white/30">✕</button>
            <div id="detail-header-bg" class="w-full h-48 bg-cover bg-center relative rounded-t-[30px]">
                <div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-10"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-white via-white/80 to-transparent z-20"></div>
            </div>
            <div class="px-5 -mt-20 relative z-30">
                <div class="flex gap-4 items-end mb-4">
                    <img id="detail-poster-img" src="" class="w-24 rounded-xl shadow-xl border-2 border-white object-cover bg-gray-200">
                    <div class="pb-1">
                        <h2 id="detail-title" class="text-xl font-black text-gray-900 leading-tight"></h2>
                        <div class="flex flex-wrap gap-1 mt-1.5">
                            <span id="detail-year" class="text-[9px] font-black text-white bg-purple-600 px-2 py-0.5 rounded uppercase shadow-sm"></span>
                            <span id="detail-rating" class="text-[9px] font-black text-gray-700 bg-white border border-gray-200 px-2 py-0.5 rounded shadow-sm"></span>
                            <span id="detail-type-tag" class="text-[9px] font-black text-orange-600 bg-orange-50 px-2 py-0.5 rounded uppercase"></span>
                        </div>
                    </div>
                </div>
                <div id="detail-tv-info" class="mb-3 hidden">
                    <p id="detail-episodes" class="text-[10px] font-black text-purple-500 uppercase"></p>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl text-[11px] text-gray-600 leading-relaxed shadow-inner border border-gray-100">
                    <p id="detail-overview" class="italic"></p>
                </div>
                
                <div id="detail-providers" class="mt-4 flex flex-wrap gap-2 items-center"></div>

                <div class="grid grid-cols-2 gap-3 text-xs mt-3">
                    <div class="bg-white p-3 rounded-xl border border-purple-50 shadow-sm">
                        <p class="font-black text-purple-400 uppercase text-[8px] mb-1">Creador/Director</p>
                        <div id="detail-director" class="font-bold text-gray-800 leading-tight"></div>
                    </div>
                    <div class="bg-white p-3 rounded-xl border border-purple-50 shadow-sm">
                        <p class="font-black text-purple-400 uppercase text-[8px] mb-1">Elenco</p>
                        <div id="detail-cast" class="font-bold text-gray-800 leading-tight"></div>
                    </div>
                </div>
                <div id="detail-actions" class="pt-5 space-y-2"></div>
            </div>
        </div>
    </div>

    <div id="avatar-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[300] backdrop-blur-sm">
        <div class="bg-white p-6 w-full max-w-xs space-y-4 rounded-[30px] shadow-2xl animate-up">
            <h3 class="font-black text-purple-900 text-center text-lg">Elige tu Avatar</h3>
            <div class="grid grid-cols-4 gap-4 text-3xl text-center">
                <span onclick="setEmoji('🌸')" class="cursor-pointer">🌸</span><span onclick="setEmoji('😎')" class="cursor-pointer">😎</span>
                <span onclick="setEmoji('🎮')" class="cursor-pointer">🎮</span><span onclick="setEmoji('🥑')" class="cursor-pointer">🥑</span>
                <span onclick="setEmoji('🐼')" class="cursor-pointer">🐼</span><span onclick="setEmoji('🦊')" class="cursor-pointer">🦊</span>
                <span onclick="setEmoji('✨')" class="cursor-pointer">✨</span><span onclick="setEmoji('👻')" class="cursor-pointer">👻</span>
            </div>
            <button onclick="closeAvatarSelector()" class="w-full py-3 bg-gray-100 text-gray-500 rounded-xl font-bold text-xs mt-2">CANCELAR</button>
        </div>
    </div>

    <div id="feedback-modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-[300] backdrop-blur-sm">
        <div class="bg-white p-6 w-full max-w-sm space-y-4 rounded-3xl animate-up shadow-2xl">
            <h3 class="font-black text-purple-900 text-lg text-center">¿Qué tal estuvo?</h3>
            <p id="f-movie-title" class="text-[10px] font-bold text-gray-500 text-center uppercase tracking-widest bg-gray-50 py-2 rounded-lg"></p>
            <select id="f-rating" class="w-full p-3 rounded-xl bg-purple-50 font-bold border-none text-sm outline-none">
                <option value="😍 Obra Maestra">😍 Obra Maestra</option><option value="😊 Muy buena">😊 Muy buena</option>
                <option value="😐 Pasable">😐 Pasable</option><option value="💩 Mala">💩 Mala</option>
            </select>
            <textarea id="f-comment" placeholder="Tu opinión..." class="w-full p-3 rounded-xl bg-purple-50 text-sm h-20 border-none outline-none"></textarea>
            <div class="flex gap-2">
                <button onclick="closeFeedbackModal()" class="py-3 px-4 bg-gray-100 text-gray-600 rounded-xl font-bold text-xs">Cancelar</button>
                <button onclick="submitFeedback()" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-black shadow-lg text-xs">GUARDAR ✅</button>
            </div>
        </div>
    </div>

    <script>
        const TMDB_KEY = '00c619133d7ec4c8817b2db0fa7abef6'; 
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzjpMySovnvqpGXUOldBB-Ia8TzlGLVuo9-Ge6JGQWPPHvLbpwR0wHpgcE-sJCC-p-eBQ/exec';

        let currentUser = "";
        let selectedGenres = [];
        let globalHistory = [];
        let globalFavorites = [];
        let profiles = [];
        let currentMovieData = null; 
        let activeMovieIdForFeedback = null;
        let searchPage = 1;
        let currentSearchMode = 'filters';
        let currentMediaType = 'movie'; // Nueva variable: 'movie' o 'tv'

        const genres_movie = [{id:28,name:"Acción"}, {id:35,name:"Comedia"}, {id:18,name:"Drama"}, {id:27,name:"Terror"}, {id:10749,name:"Romance"}, {id:878,name:"Sci-Fi"}];
        const genres_tv = [{id:10759,name:"Acción/Aven"}, {id:35,name:"Comedia"}, {id:18,name:"Drama"}, {id:10765,name:"Sci-Fi/Fant"}, {id:80,name:"Crimen"}, {id:9648,name:"Misterio"}];

        window.onload = async () => {
            try {
                const res = await fetch(`${GAS_URL}?action=getProfiles`);
                profiles = await res.json();
                renderProfiles();
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('user-selection').classList.remove('hidden');
            } catch(e) { alert("Error de conexión."); }
        };

        function renderProfiles() {
            const container = document.getElementById('profile-container');
            container.innerHTML = "";
            profiles.forEach(p => {
                container.innerHTML += `<button onclick="selectUser('${p.user}', '${p.emoji}')" class="flex flex-col items-center"><div class="w-24 h-24 bg-white rounded-full mb-2 shadow-2xl flex items-center justify-center text-5xl border-4 border-white active:scale-90 transition">${p.emoji}</div><span class="font-black text-purple-900 text-lg">${p.user}</span></button>`;
            });
        }

        async function selectUser(user, emoji) {
            currentUser = user;
            document.getElementById('user-selection').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            document.getElementById('welcome').innerText = user;
            document.getElementById('main-avatar').innerText = emoji;
            renderGenres();
            showTab('explorar');
            await loadData();
        }

        // Cambiar entre Películas y Series
        function setMediaType(type) {
            currentMediaType = type;
            const mBtn = document.getElementById('type-movie-btn');
            const tBtn = document.getElementById('type-tv-btn');
            if(type === 'movie') {
                mBtn.className = "flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-purple-600 text-white shadow-lg";
                tBtn.className = "flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-white text-gray-400 border border-gray-100";
            } else {
                tBtn.className = "flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-purple-600 text-white shadow-lg";
                mBtn.className = "flex-1 py-2 rounded-xl text-[10px] font-black uppercase transition-all bg-white text-gray-400 border border-gray-100";
            }
            selectedGenres = [];
            renderGenres();
            fetchData(false);
        }

        function renderGenres() {
            const container = document.getElementById('genre-container');
            const list = currentMediaType === 'movie' ? genres_movie : genres_tv;
            container.innerHTML = "";
            list.forEach(g => {
                const b = document.createElement('div');
                b.className = 'genre-bubble px-3 py-1.5 text-[10px] font-black uppercase rounded-lg text-gray-600 bg-white/70 shadow-sm';
                b.innerText = g.name;
                b.onclick = () => {
                    if(selectedGenres.includes(g.id)) { selectedGenres = selectedGenres.filter(i=>i!==g.id); b.classList.remove('selected'); } 
                    else if(selectedGenres.length < 3) { selectedGenres.push(g.id); b.classList.add('selected'); }
                };
                container.appendChild(b);
            });
        }

        function setSearchMode(mode) {
            currentSearchMode = mode;
            document.getElementById('mode-text-btn').classList.toggle('text-purple-800', mode === 'text');
            document.getElementById('mode-filter-btn').classList.toggle('text-purple-800', mode === 'filters');
            document.getElementById('search-text-container').classList.toggle('hidden', mode === 'filters');
            document.getElementById('search-filter-container').classList.toggle('hidden', mode === 'text');
        }

        async function fetchData(isLoadMore = false) {
            const container = document.getElementById('movie-results');
            const btnMore = document.getElementById('btn-load-more');
            if(!isLoadMore) { searchPage = 1; container.innerHTML = "<p class='text-center p-6 text-xs font-bold animate-pulse'>Buscando...</p>"; } 
            else { searchPage++; }

            let url = "";
            const today = new Date().toISOString().split('T')[0];
            const endPoint = currentMediaType === 'movie' ? 'movie' : 'tv';

            if(currentSearchMode === 'text') {
                const query = document.getElementById('search-input').value;
                url = `https://api.themoviedb.org/3/search/${endPoint}?api_key=${TMDB_KEY}&language=es-ES&query=${encodeURIComponent(query)}&page=${searchPage}`;
            } else {
                const genreIds = selectedGenres.join(',');
                const region = document.getElementById('region').value;
                const decade = document.getElementById('decade').value;
                url = `https://api.themoviedb.org/3/discover/${endPoint}?api_key=${TMDB_KEY}&language=es-ES&sort_by=popularity.desc&page=${searchPage}`;
                if(genreIds) url += `&with_genres=${genreIds}`;
                if(region) url += `&with_origin_country=${region}`;
                if(decade === "classic") url += `&${currentMediaType === 'movie' ? 'primary_release_date.lte' : 'first_air_date.lte'}=1989-12-31`;
                else if(decade) url += `&${currentMediaType === 'movie' ? 'primary_release_date.gte' : 'first_air_date.gte'}=${decade}-01-01`;
            }

            try {
                const res = await fetch(url);
                const data = await res.json();
                if(!isLoadMore) container.innerHTML = "";
                data.results.forEach(m => {
                    const title = m.title || m.name;
                    const date = m.release_date || m.first_air_date || 'N/A';
                    const posterUrl = m.poster_path ? `https://image.tmdb.org/t/p/w200${m.poster_path}` : 'https://via.placeholder.com/200x300';
                    container.innerHTML += `
                        <div onclick="openMovieDetail(${m.id}, 'explore', '${currentMediaType}')" class="glass p-3 flex gap-3 animate-up shadow-sm cursor-pointer hover:bg-white/90">
                            <img src="${posterUrl}" class="w-16 h-24 rounded-lg object-cover shadow border border-white">
                            <div class="flex-1 flex flex-col justify-center">
                                <h4 class="font-black text-sm leading-tight text-gray-800">${title}</h4>
                                <p class="text-[9px] text-gray-500 font-bold uppercase mt-1.5">${date.split('-')[0]} • ⭐ ${m.vote_average.toFixed(1)}</p>
                            </div>
                        </div>`;
                });
                btnMore.classList.toggle('hidden', data.page >= data.total_pages);
                document.getElementById('search-title').classList.remove('hidden');
            } catch(e) { container.innerHTML = "Error al buscar."; }
        }

        async function openMovieDetail(id, context, type) {
            const modal = document.getElementById('movie-detail-modal');
            modal.classList.remove('hidden');
            document.getElementById('detail-title').innerText = "Cargando...";
            const pDiv = document.getElementById('detail-providers');
            pDiv.innerHTML = "";

            try {
                const res = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_KEY}&language=es-ES&append_to_response=credits,watch/providers`);
                const det = await res.json();

                const title = det.title || det.name;
                const year = (det.release_date || det.first_air_date || 'N/A').split('-')[0];
                const cast = det.credits.cast.slice(0, 3).map(c => c.name).join(', ');
                const creator = type === 'movie' ? (det.credits.crew.find(c => c.job === 'Director')?.name || 'N/A') : (det.created_by?.[0]?.name || 'N/A');

                document.getElementById('detail-header-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/w500${det.backdrop_path})`;
                document.getElementById('detail-poster-img').src = `https://image.tmdb.org/t/p/w300${det.poster_path}`;
                document.getElementById('detail-title').innerHTML = `${title} <br><span class="text-[10px] text-gray-400">(${det.original_title || det.original_name})</span>`;
                document.getElementById('detail-year').innerText = year;
                document.getElementById('detail-rating').innerText = `⭐ ${det.vote_average.toFixed(1)}`;
                document.getElementById('detail-type-tag').innerText = type === 'movie' ? 'Pelicula' : 'Serie';
                document.getElementById('detail-overview').innerText = det.overview || "Sin sinopsis.";
                document.getElementById('detail-director').innerText = creator;
                document.getElementById('detail-cast').innerText = cast;

                // Información específica de series
                const tvInfo = document.getElementById('detail-tv-info');
                if(type === 'tv') {
                    tvInfo.classList.remove('hidden');
                    document.getElementById('detail-episodes').innerText = `${det.number_of_seasons} Temporadas • ${det.number_of_episodes} Episodios`;
                } else {
                    tvInfo.classList.add('hidden');
                }

                // Plataformas (Región Chile CL como base)
                const providers = det['watch/providers']?.results?.CL?.flatrate || [];
                if (providers.length > 0) {
                    pDiv.innerHTML = `<p class="text-[8px] font-black uppercase text-purple-400 w-full mb-1">Disponible en</p>` + 
                    providers.map(p => `<img src="https://image.tmdb.org/t/p/original${p.logo_path}" class="w-7 h-7 rounded-lg shadow-sm border">`).join('');
                }

                currentMovieData = { id: det.id, title: title, poster: det.poster_path, type: type, year: year };

                const actions = document.getElementById('detail-actions');
                actions.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="saveToWL('¡Verla Ya!')" class="flex-1 py-3 bg-purple-600 text-white rounded-xl font-black text-xs shadow-lg">🍿 Mi Lista</button>
                        <button onclick="openFeedbackModal('${det.id}', '${title}')" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-black text-xs shadow-lg">✅ Vista</button>
                    </div>`;

            } catch(e) { document.getElementById('detail-title').innerText = "Error."; }
        }

        async function saveToWL(priority) {
            const payload = { action: 'saveInteraction', user: currentUser, movie_id: currentMovieData.id, title: currentMovieData.title, poster: currentMovieData.poster, year: currentMovieData.year, watched: "FALSE", priority: priority };
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            closeDetailModal(); loadData();
        }

        function closeDetailModal() { document.getElementById('movie-detail-modal').classList.add('hidden'); }
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.getElementById(`btn-${t}`).classList.add('active');
        }

        // Lógica de carga de datos (Historial, Favoritos, etc.) - Conectada a tu GAS_URL
        async function loadData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getHistory`);
                globalHistory = await res.json();
                renderWatchlist();
                renderHistoryTab();
            } catch(e) { console.log("Carga de datos omitida por falta de conexión activa."); }
        }

        function getLatestStates() {
            const myInteractions = globalHistory.filter(h => h.usuario === currentUser);
            const latest = new Map();
            myInteractions.forEach(h => latest.set(h.id_tmdb, h));
            return Array.from(latest.values());
        }

        function renderWatchlist() {
            const container = document.getElementById('tab-prioridades');
            const pending = getLatestStates().filter(s => s.vista_completa === "FALSE" || s.vista_completa === false).reverse();
            container.innerHTML = "<h3 class='font-black text-sm text-purple-900 pl-2'>Mi Lista 📝</h3>";
            pending.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl flex gap-3 items-center shadow-sm mb-3">
                        <img src="https://image.tmdb.org/t/p/w200${p.poster}" class="w-14 h-20 rounded-lg object-cover">
                        <div class="flex-1">
                            <p class="font-black text-[13px] text-gray-800">${p.titulo}</p>
                            <span class="text-[8px] font-black uppercase px-2 py-0.5 bg-purple-50 text-purple-600 rounded">Pendiente</span>
                        </div>
                    </div>`;
            });
        }

        function renderHistoryTab() {
            const container = document.getElementById('tab-historial');
            const views = getLatestStates().filter(s => s.vista_completa === "TRUE" || s.vista_completa === true).reverse();
            container.innerHTML = "<h3 class='font-black text-sm text-purple-900 pl-2 mb-2'>Vistas 🍿</h3>";
            views.forEach(h => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded-2xl shadow-sm flex gap-3 mb-3">
                        <img src="https://image.tmdb.org/t/p/w200${h.poster}" class="w-14 h-20 rounded-lg object-cover">
                        <div class="flex-1">
                            <p class="font-black text-[13px] text-gray-800">${h.titulo}</p>
                            <span class="text-[9px] font-black bg-gray-100 px-2 py-0.5 rounded">${h.calificacion}</span>
                        </div>
                    </div>`;
            });
        }

        function openAvatarSelector() { document.getElementById('avatar-modal').classList.remove('hidden'); }
        function closeAvatarSelector() { document.getElementById('avatar-modal').classList.add('hidden'); }
        function setEmoji(em) { document.getElementById('main-avatar').innerText = em; closeAvatarSelector(); }
        
        function openFeedbackModal(id, title) {
            event.stopPropagation(); closeDetailModal(); 
            activeMovieIdForFeedback = id; document.getElementById('f-movie-title').innerText = title;
            document.getElementById('feedback-modal').classList.remove('hidden');
        }
        function closeFeedbackModal() { document.getElementById('feedback-modal').classList.add('hidden'); }

        async function submitFeedback() {
            const payload = {
                action: 'saveInteraction', user: currentUser, movie_id: activeMovieIdForFeedback,
                title: document.getElementById('f-movie-title').innerText, 
                poster: currentMovieData.poster, year: currentMovieData.year,
                watched: "TRUE", rating: document.getElementById('f-rating').value, comment: document.getElementById('f-comment').value
            };
            await fetch(GAS_URL, { method:'POST', mode:'no-cors', body:JSON.stringify(payload)});
            closeFeedbackModal(); loadData();
        }
    </script>
</body>
</html>
